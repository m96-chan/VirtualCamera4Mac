name: Release

# Signing runs ONLY on version tags (and manual dispatch) — never on PRs — so
# repository secrets are never exposed to untrusted pull requests.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Signed build, notarize & publish
    runs-on: macos-15
    permissions:
      contents: write # create the GitHub Release and upload assets
    env:
      APP_BUNDLE_ID: io.github.m96chan.VirtualCamera4Mac
      EXT_BUNDLE_ID: io.github.m96chan.VirtualCamera4Mac.Extension
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import Developer ID signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Make the temporary keychain visible to codesign/xcodebuild.
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profiles
        env:
          PROVISIONING_PROFILE_APP_BASE64: ${{ secrets.PROVISIONING_PROFILE_APP_BASE64 }}
          PROVISIONING_PROFILE_EXT_BASE64: ${{ secrets.PROVISIONING_PROFILE_EXT_BASE64 }}
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROVISIONING_PROFILE_APP_BASE64" | base64 --decode > "$PROFILE_DIR/app.provisionprofile"
          echo "$PROVISIONING_PROFILE_EXT_BASE64" | base64 --decode > "$PROFILE_DIR/ext.provisionprofile"

      - name: Archive (Manual signing)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME_APP: ${{ secrets.PROVISIONING_PROFILE_NAME_APP }}
          PROFILE_NAME_EXT: ${{ secrets.PROVISIONING_PROFILE_NAME_EXT }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project VirtualCamera4Mac.xcodeproj \
            -scheme VirtualCamera4Mac \
            -destination 'generic/platform=macOS' \
            -archivePath "$RUNNER_TEMP/VirtualCamera4Mac.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export archive (Developer ID)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME_APP: ${{ secrets.PROVISIONING_PROFILE_NAME_APP }}
          PROFILE_NAME_EXT: ${{ secrets.PROVISIONING_PROFILE_NAME_EXT }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>developer-id</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key><string>${PROFILE_NAME_APP}</string>
              <key>${EXT_BUNDLE_ID}</key><string>${PROFILE_NAME_EXT}</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/VirtualCamera4Mac.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Notarize & staple
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/export/VirtualCamera4Mac.app"
          ZIP="$RUNNER_TEMP/VirtualCamera4Mac.zip"
          KEY_PATH="$RUNNER_TEMP/asc_authkey.p8"

          # Same App Store Connect API key used by `fastlane setup_signing`.
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"

          ditto -c -k --keepParent "$APP" "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --key "$KEY_PATH" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait
          xcrun stapler staple "$APP"
          # Repackage the stapled app for distribution.
          rm -f "$ZIP"
          ditto -c -k --keepParent "$APP" "$ZIP"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/VirtualCamera4Mac.zip
          generate_release_notes: true
