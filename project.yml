name: VirtualCamera4Mac
options:
  bundleIdPrefix: io.github.m96chan
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.45.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: "YES"
    # Developer ID signing for release. CI verify passes CODE_SIGNING_ALLOWED=NO
    # so tests / compile-checks need no certificate; the release build signs for
    # real. Per-target provisioning profiles are set on the app + extension.
    DEVELOPMENT_TEAM: "9U26G7YWJ9"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    ENABLE_HARDENED_RUNTIME: "YES"

targets:
  # ---- Pure, unit-testable core (Phase A) ---------------------------------
  VirtualCameraCore:
    type: framework
    platform: macOS
    sources:
      - Sources/VirtualCameraCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.m96chan.VirtualCameraCore

  VirtualCameraCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/VirtualCameraCoreTests
    dependencies:
      - target: VirtualCameraCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.m96chan.VirtualCameraCoreTests

  # ---- Camera Extension (CMIO System Extension) (Phase B) -----------------
  VirtualCamera4MacExtension:
    type: system-extension
    platform: macOS
    sources:
      - Sources/Extension
    dependencies:
      - target: VirtualCameraCore
        embed: true
    info:
      path: Sources/Extension/Info.plist
      properties:
        CFBundleDisplayName: VirtualCamera4Mac Extension
        # Required by CoreMediaIO; must be prefixed by the team identifier.
        CMIOExtension:
          CMIOExtensionMachServiceName: $(TeamIdentifierPrefix)$(PRODUCT_BUNDLE_IDENTIFIER)
        NSSystemExtensionUsageDescription: Provides the VirtualCamera4Mac virtual camera device.
    entitlements:
      path: Sources/Extension/Extension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - $(TeamIdentifierPrefix)io.github.m96chan.VirtualCamera4Mac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.m96chan.VirtualCamera4Mac.Extension
        # Swift 5 language mode: the CMIO callback/timer code is not written for
        # Swift 6 strict concurrency. Core stays on Swift 6.
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: "NO"
        PROVISIONING_PROFILE_SPECIFIER: "VirtualCamera4Mac Extension Developer ID"
        SKIP_INSTALL: "YES"

  # ---- Container app (Phase B) --------------------------------------------
  VirtualCamera4Mac:
    type: application
    platform: macOS
    sources:
      - Sources/App
    dependencies:
      - target: VirtualCameraCore
        embed: true
      - target: VirtualCamera4MacExtension
        embed: true
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: VirtualCamera4Mac
        LSMinimumSystemVersion: "13.0"
        # Menu bar agent — no Dock icon (#5).
        LSUIElement: true
        NSSystemExtensionUsageDescription: Installs the VirtualCamera4Mac virtual camera system extension.
    entitlements:
      path: Sources/App/VirtualCamera4Mac.entitlements
      properties:
        com.apple.developer.system-extension.install: true
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - $(TeamIdentifierPrefix)io.github.m96chan.VirtualCamera4Mac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.m96chan.VirtualCamera4Mac
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: "NO"
        PROVISIONING_PROFILE_SPECIFIER: "VirtualCamera4Mac Developer ID"

schemes:
  VirtualCameraCore:
    build:
      targets:
        VirtualCameraCore: all
        VirtualCameraCoreTests: [test]
    test:
      gatherCoverageData: true
      coverageTargets:
        - VirtualCameraCore
      targets:
        - VirtualCameraCoreTests

  VirtualCamera4Mac:
    build:
      targets:
        VirtualCamera4Mac: all
        VirtualCamera4MacExtension: all
